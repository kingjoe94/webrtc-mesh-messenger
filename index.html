<style>

<body>
<main class="app">
  <section class="panel">
    <div class="appHeader">
      <div class="titleBlock">
        <div class="row">
          <h1>Mesh Messenger MVP</h1>
          <span id="status" class="status">未接続</span>
        </div>
        <div class="metaBar">
          <span class="meta">再接続 <span id="signalingMode">QR交換</span></span>
        </div>
      </div>
    </div>
    <p>近くにいる相手とQRでつなぎ、短いメッセージを直接送ります。</p>
    <p id="runtimeWarning" class="notice hidden"></p>
    <div class="identity">
      <div class="metric">
        <span class="metricLabel">自分のID</span>
        <span class="metricValue" id="deviceId"></span>
      </div>
      <div class="metric">
        <span class="metricLabel">保存済みの相手</span>
        <span class="metricValue"><span id="friendCount">0</span> 件</span>
      </div>
      <div class="metric">
        <span class="metricLabel">メッセージ</span>
        <span class="metricValue">暗号化</span>
      </div>
    </div>
    <div class="friendsWrap">
      <div class="muted">保存済みの相手</div>
      <ul id="friendsList" class="friends"></ul>
    </div>
  </section>

  <section id="startPanel" class="panel">
    <h2>はじめる</h2>
    <div class="actions">
      <button id="hostStart" type="button">招待する</button>
      <button id="guestStart" class="secondary" type="button">参加する</button>
    </div>
  </section>

  <section id="hostOfferPanel" class="panel hidden">
    <h2>招待QR</h2>
    <p>相手のスマホカメラで読み取ってもらいます。</p>
    <div id="hostQr" class="qr"></div>
    <textarea id="hostCode" readonly></textarea>
    <div class="actions">
      <button data-copy="hostCode" type="button">コードをコピー</button>
      <button id="hostScanAnswer" class="secondary" type="button">返信を読む</button>
    </div>
  </section>

  <section id="hostAnswerPanel" class="panel hidden">
    <h2>返信QRを読む</h2>
    <div id="hostScanner"></div>
    <textarea id="hostAnswerPaste" placeholder="返信コードを貼り付け"></textarea>
    <div class="actions">
      <button id="hostAcceptAnswer" type="button">接続する</button>
    </div>
  </section>

  <section id="guestOfferPanel" class="panel hidden">
    <h2>招待QRを読む</h2>
    <div id="guestScanner"></div>
    <textarea id="guestOfferPaste" placeholder="招待コードを貼り付け"></textarea>
    <div class="actions">
      <button id="guestAcceptOffer" type="button">読み込む</button>
    </div>
  </section>

  <section id="guestAnswerPanel" class="panel hidden">
    <h2>返信QR</h2>
    <p>招待した人に読み取ってもらいます。</p>
    <div id="guestQr" class="qr"></div>
    <textarea id="guestCode" readonly></textarea>
    <div class="actions">
      <button data-copy="guestCode" type="button">コードをコピー</button>
    </div>
  </section>

  <section class="panel chat">
    <div id="messages" class="messages"></div>
    <form id="messageForm" class="composer">
      <input id="messageInput" maxlength="500" autocomplete="off" placeholder="500文字まで">
      <button id="sendMessage" type="submit">送信</button>
    </form>
  </section>
</main>

<script>
const MAX_TEXT_LENGTH = 500;
const APP_VERSION = "2026-06-03.11-hide-reset-id";
const ICE = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDqEILuABkK0m79iy80Uu_z2W_TbJqT-uU",
  authDomain: "webrtc-mesh-messenger-mvp.firebaseapp.com",
  projectId: "webrtc-mesh-messenger-mvp",
  storageBucket: "webrtc-mesh-messenger-mvp.firebasestorage.app",
  messagingSenderId: "458710956799",
  appId: "1:458710956799:web:075abfb239dcf4dd766aca"
};
const $ = (id) => document.getElementById(id);
const views = ["startPanel","hostOfferPanel","hostAnswerPanel","guestOfferPanel","guestAnswerPanel"];
let pc, channel, role, identity, peerPublicJwk, sharedKey, scanStream, scanRAF, expectedFriendId, signalingProvider;

const els = {
  status: $("status"), deviceId: $("deviceId"), friendCount: $("friendCount"), friendsList: $("friendsList"), signalingMode: $("signalingMode"), messages: $("messages"),
  input: $("messageInput"), send: $("sendMessage"), form: $("messageForm")
};

window.addEventListener("error", (event) => {
  addMessage("system", `エラー: ${event.message}`);
});
window.addEventListener("unhandledrejection", (event) => {
  const message = event.reason?.message || String(event.reason);
  addMessage("system", `エラー: ${message}`);
});

init();

async function init(){
  try{
    const versionEl = $("appVersion");
    if (versionEl) versionEl.textContent = APP_VERSION;
    showRuntimeWarning();
    identity = await loadIdentity();
    els.deviceId.textContent = identity.deviceId;
    signalingProvider = createSignalingProvider(identity);
    els.signalingMode.textContent = signalingProvider.label;
    await signalingProvider.connect();
    signalingProvider.onSignal(handleProviderSignal);
    updateFriendCount();
    els.send.disabled = true;
    addMessage("system","未接続です。");
    await handleUrlSignal();
  }catch(error){
    addMessage("system",`初期化エラー: ${error.message}`);
  }
}

async function handleUrlSignal(){
  const params = new URLSearchParams(location.search);
  const offer = params.get("offer");
  if (!offer) return;
  role = "guest";
  show("guestOfferPanel");
  addMessage("system","URL内の招待コードを読み込みます。");
  await guestAccept(offer);
}

function showRuntimeWarning(){
  const warnings = [];
  if (!window.isSecureContext) {
    warnings.push("スマホでカメラ読み取りを使うにはHTTPSで開く必要があります。index.htmlをファイルとして送るだけでは動かないことがあります。");
  }
  if (!window.QRCode || !window.jsQR) {
    warnings.push("QRライブラリを読み込めていません。インターネット接続がある状態でHTTPS配信されたページとして開いてください。");
  }
  if (!navigator.mediaDevices?.getUserMedia) {
    warnings.push("この開き方ではカメラAPIを使えません。QRの代わりにコード貼り付けを使うか、HTTPSで開いてください。");
  }
  if (!crypto.subtle) {
    warnings.push("この開き方ではWeb Cryptoを使えません。HTTPSで開いてください。");
  }
  if (!warnings.length) return;
  $("runtimeWarning").textContent = warnings.join(" ");
  $("runtimeWarning").classList.remove("hidden");
}

$("hostStart").onclick = startHost;
$("guestStart").onclick = startGuest;
$("hostScanAnswer").onclick = () => { show("hostAnswerPanel"); startScanner("hostScanner", hostAccept); };
$("hostAcceptAnswer").onclick = () => hostAccept($("hostAnswerPaste").value);
$("guestAcceptOffer").onclick = () => guestAccept($("guestOfferPaste").value);
document.querySelectorAll("[data-copy]").forEach((button) => {
  button.onclick = async () => {
    const target = $(button.dataset.copy);
    await navigator.clipboard.writeText(target.value);
    addMessage("system","コードをコピーしました。");
  };
});
els.form.onsubmit = async (event) => {
  event.preventDefault();
  const text = els.input.value.trim();
  if (!text || !sharedKey || channel?.readyState !== "open") return;
  if (text.length > MAX_TEXT_LENGTH) return addMessage("system",`本文は${MAX_TEXT_LENGTH}文字までです。`);
  const envelope = await encryptText(text);
  channel.send(JSON.stringify(envelope));
  addMessage("local", text);
  els.input.value = "";
};

async function loadIdentity(){
  const saved = localStorage.getItem("mesh-messenger:identity");
  if (saved) {
    const parsed = JSON.parse(saved);
    parsed.privateKey = await crypto.subtle.importKey("jwk", parsed.privateJwk, { name:"ECDH", namedCurve:"P-256" }, true, ["deriveKey"]);
    return parsed;
  }
  const pair = await crypto.subtle.generateKey({ name:"ECDH", namedCurve:"P-256" }, true, ["deriveKey"]);
  const publicJwk = await crypto.subtle.exportKey("jwk", pair.publicKey);
  const privateJwk = await crypto.subtle.exportKey("jwk", pair.privateKey);
  const deviceId = await shortHash(JSON.stringify(publicJwk));
  const next = { deviceId, publicJwk, privateJwk, privateKey: pair.privateKey };
  localStorage.setItem("mesh-messenger:identity", JSON.stringify({ deviceId, publicJwk, privateJwk }));
  return next;
}

async function shortHash(text){
  const bytes = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(bytes)].slice(0, 8).map((b) => b.toString(16).padStart(2,"0")).join("");
}

async function startHost(){
  role = "host";
  expectedFriendId = null;
  createPeer(true);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIce();
  const code = await pack({ v:1, kind:"offer", deviceId:identity.deviceId, publicJwk:identity.publicJwk, sdp:pc.localDescription });
  $("hostCode").value = code;
  makeQr("hostQr", makeOfferUrl(code));
  show("hostOfferPanel");
}

async function startReconnect(friendId){
  const friend = getFriends().find((item) => item.friendId === friendId);
  if (!friend) return addMessage("system","保存済みの相手が見つかりません。");
  if (signalingProvider.supportsRemoteReconnect) {
    await startProviderReconnect(friend);
    return;
  }
  await startQrReconnect(friend);
}

async function startProviderReconnect(friend){
  role = "host";
  expectedFriendId = friend.friendId;
  peerPublicJwk = friend.publicJwk;
  createPeer(true);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIce();
  await signalingProvider.sendSignal(friend.friendId, {
    kind:"offer",
    mode:"reconnect",
    sdp:serializeDescription(pc.localDescription)
  });
  addMessage("system",`${signalingProvider.label} で ${friend.friendId} に再接続リクエストを送りました。相手の応答を待っています。`);
}

async function startQrReconnect(friend){
  role = "host";
  expectedFriendId = friend.friendId;
  createPeer(true);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIce();
  const code = await pack({
    v:1, kind:"offer", mode:"reconnect", reconnectTo:friend.friendId,
    deviceId:identity.deviceId, publicJwk:identity.publicJwk, sdp:pc.localDescription
  });
  $("hostCode").value = code;
  makeQr("hostQr", makeOfferUrl(code));
  show("hostOfferPanel");
  addMessage("system",`${friend.friendId} への再接続QRを作成しました。相手に読み取ってもらってください。`);
}

function createSignalingProvider(currentIdentity){
  if (FIREBASE_CONFIG?.apiKey) return new FirebaseSignalingProvider(currentIdentity, FIREBASE_CONFIG);
  return new ManualQrSignalingProvider(currentIdentity);
}

class FirebaseSignalingProvider {
  constructor(currentIdentity, config){
    this.identity = currentIdentity;
    this.config = config;
    this.label = "Firebase";
    this.supportsRemoteReconnect = true;
    this.unsubscribe = null;
    this.seenSignalIds = loadSeenSignalIds(this.identity.deviceId);
    this.onSignalCallback = () => {};
  }
  async connect(){
    const appModule = await import("https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js");
    const firestoreModule = await import("https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js");
    this.firebase = {
      appModule,
      firestoreModule,
      app: appModule.initializeApp(this.config)
    };
    this.db = firestoreModule.getFirestore(this.firebase.app);
    this.inboxRef = firestoreModule.collection(this.db, "devices", this.identity.deviceId, "signals");
    this.unsubscribe = firestoreModule.onSnapshot(this.inboxRef, (snapshot) => {
      snapshot.docChanges().forEach((change) => {
        if (change.type !== "added") return;
        if (this.seenSignalIds.has(change.doc.id)) return;
        this.seenSignalIds.add(change.doc.id);
        saveSeenSignalIds(this.identity.deviceId, this.seenSignalIds);
        const signal = change.doc.data();
        if (signal.to !== this.identity.deviceId) return;
        this.onSignalCallback(signal, change.doc.ref);
      });
    });
    return { deviceId:this.identity.deviceId };
  }
  async publishPresence(){
    return false;
  }
  async sendSignal(friendId, signal){
    const { addDoc, collection, serverTimestamp, Timestamp } = this.firebase.firestoreModule;
    const expiresAt = Timestamp.fromMillis(Date.now() + 5 * 60 * 1000);
    await addDoc(collection(this.db, "devices", friendId, "signals"), {
      ...signal,
      from: this.identity.deviceId,
      to: friendId,
      createdAt: serverTimestamp(),
      expiresAt
    });
  }
  async deleteSignal(signalRef){
    const { deleteDoc } = this.firebase.firestoreModule;
    await deleteDoc(signalRef);
  }
  onSignal(callback){
    this.onSignalCallback = callback;
    return () => { this.onSignalCallback = () => {}; };
  }
  disconnect(){
    this.unsubscribe?.();
    this.unsubscribe = null;
  }
}

class ManualQrSignalingProvider {
  constructor(currentIdentity){
    this.identity = currentIdentity;
    this.label = "QR交換";
    this.supportsRemoteReconnect = false;
  }
  async connect(){
    return { deviceId:this.identity.deviceId };
  }
  async publishPresence(){
    return false;
  }
  async sendSignal(){
    throw new Error("QR交換モードではリモート再接続シグナルを送れません。");
  }
  async deleteSignal(){}
  onSignal(){
    return () => {};
  }
  disconnect(){}
}

async function handleProviderSignal(signal, signalRef){
  try{
    if (isExpiredSignal(signal)) {
      await cleanupProviderSignal(signalRef);
      return;
    }
    if (signal.kind === "offer") {
      await acceptProviderOffer(signal);
    } else if (signal.kind === "answer") {
      await acceptProviderAnswer(signal);
    }
    await cleanupProviderSignal(signalRef);
  }catch(error){
    addMessage("system",`Firebaseシグナルを処理できません: ${error.message}`);
  }
}

async function cleanupProviderSignal(signalRef){
  try{
    await signalingProvider.deleteSignal(signalRef);
  }catch(error){
    console.warn("Firebase signal cleanup failed", error);
  }
}

function loadSeenSignalIds(deviceId){
  const key = `mesh-messenger:seen-signals:${deviceId}`;
  return new Set(JSON.parse(localStorage.getItem(key) || "[]"));
}

function saveSeenSignalIds(deviceId, ids){
  const key = `mesh-messenger:seen-signals:${deviceId}`;
  localStorage.setItem(key, JSON.stringify([...ids].slice(-200)));
}

async function acceptProviderOffer(signal){
  if (signal.mode !== "reconnect") throw new Error("未対応のFirebase offerです。");
  const friend = getFriends().find((item) => item.friendId === signal.from);
  if (!friend) throw new Error("保存済みではない相手からの再接続です。");
  role = "guest";
  expectedFriendId = signal.from;
  peerPublicJwk = friend.publicJwk;
  createPeer(false);
  await pc.setRemoteDescription(signal.sdp);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitForIce();
  await deriveSharedKey(peerPublicJwk);
  await signalingProvider.sendSignal(friend.friendId, {
    kind:"answer",
    mode:"reconnect",
    sdp:serializeDescription(pc.localDescription)
  });
  addMessage("system",`${friend.friendId} からのFirebase再接続に応答しました。`);
}

async function acceptProviderAnswer(signal){
  if (signal.mode !== "reconnect") throw new Error("未対応のFirebase answerです。");
  if (!expectedFriendId || signal.from !== expectedFriendId) throw new Error("選択した相手とは別のFirebase answerです。");
  const friend = getFriends().find((item) => item.friendId === signal.from);
  if (!friend) throw new Error("保存済みではない相手からの返信です。");
  peerPublicJwk = friend.publicJwk;
  await pc.setRemoteDescription(signal.sdp);
  await deriveSharedKey(peerPublicJwk);
  addMessage("system",`${friend.friendId} のFirebase返信を読み込みました。接続を確立しています。`);
}

function isExpiredSignal(signal){
  const expiresAt = signal.expiresAt?.toMillis?.() || 0;
  return expiresAt && expiresAt <= Date.now();
}

function serializeDescription(description){
  return { type:description.type, sdp:description.sdp };
}

function startGuest(){
  role = "guest";
  addMessage("system","参加モードを開始しました。カメラ起動を試します。");
  show("guestOfferPanel");
  startScanner("guestScanner", guestAccept);
}

async function guestAccept(raw){
  try{
    raw = extractSignalCode(raw, "offer");
    if (!raw.trim()) {
      addMessage("system","貼り付け欄が空です。QRを読むか、招待コードを貼り付けてください。");
      return false;
    }
    const offer = await unpack(raw);
    stopScanner();
    if (offer.kind !== "offer") throw new Error("招待コードではありません。");
    if (offer.reconnectTo && offer.reconnectTo !== identity.deviceId) throw new Error("この端末宛ての再接続コードではありません。");
    const offerFriendId = await shortHash(JSON.stringify(offer.publicJwk));
    if (offer.mode === "reconnect" && !getFriends().some((friend) => friend.friendId === offerFriendId)) {
      throw new Error("保存済みではない相手からの再接続コードです。");
    }
    peerPublicJwk = offer.publicJwk;
    createPeer(false);
    await pc.setRemoteDescription(offer.sdp);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await waitForIce();
    await deriveSharedKey(peerPublicJwk);
    const code = await pack({ v:1, kind:"answer", deviceId:identity.deviceId, publicJwk:identity.publicJwk, sdp:pc.localDescription });
    $("guestCode").value = code;
    makeQr("guestQr", code);
    show("guestAnswerPanel");
    addMessage("system",`${offer.deviceId} の招待を読み込みました。返信QRを相手に見せてください。`);
    return true;
  }catch(error){ addMessage("system",`招待コードを読めません: ${error.message}`); }
  return false;
}

async function hostAccept(raw){
  try{
    raw = extractSignalCode(raw, "answer");
    if (!raw.trim()) {
      addMessage("system","貼り付け欄が空です。QRを読むか、返信コードを貼り付けてください。");
      return false;
    }
    const answer = await unpack(raw);
    stopScanner();
    if (answer.kind !== "answer") throw new Error("返信コードではありません。");
    const answerFriendId = await shortHash(JSON.stringify(answer.publicJwk));
    if (expectedFriendId && answerFriendId !== expectedFriendId) throw new Error("選択した相手とは別の返信コードです。");
    peerPublicJwk = answer.publicJwk;
    await pc.setRemoteDescription(answer.sdp);
    await deriveSharedKey(peerPublicJwk);
    addMessage("system",`${answer.deviceId} の返信を読み込みました。接続を確立しています。`);
    return true;
  }catch(error){ addMessage("system",`返信コードを読めません: ${error.message}`); }
  return false;
}

function extractSignalCode(raw, key){
  const text = raw.trim();
  try{
    const url = new URL(text);
    return url.searchParams.get(key) || text;
  }catch{
    return text;
  }
}

function makeOfferUrl(code){
  const url = new URL(location.href);
  url.search = "";
  url.hash = "";
  url.searchParams.set("offer", code);
  return url.toString();
}

function createPeer(isHost){
  pc?.close();
  channel?.close();
  sharedKey = null;
  pc = new RTCPeerConnection(ICE);
  pc.onconnectionstatechange = updateStatus;
  pc.oniceconnectionstatechange = updateStatus;
  pc.ondatachannel = (event) => wireChannel(event.channel);
  if (isHost) wireChannel(pc.createDataChannel("messages", { ordered:true }));
  updateStatus();
}

function wireChannel(next){
  channel = next;
  channel.onopen = async () => {
    if (peerPublicJwk) await saveFriend(peerPublicJwk);
    addMessage("system","DataChannelが開きました。");
    updateStatus();
  };
  channel.onclose = updateStatus;
  channel.onerror = updateStatus;
  channel.onmessage = async (event) => {
    try{
      const envelope = JSON.parse(event.data);
      const text = await decryptText(envelope);
      if (text.length > MAX_TEXT_LENGTH) throw new Error("本文が長すぎます。");
      addMessage("remote", text);
    }catch(error){ addMessage("system",`受信データを復号できません: ${error.message}`); }
  };
  updateStatus();
}

async function saveFriend(publicJwk){
  const friendId = await shortHash(JSON.stringify(publicJwk));
  const key = "mesh-messenger:friends";
  const friends = getFriends();
  const now = Date.now();
  const existing = friends.find((friend) => friend.friendId === friendId);
  if (existing) {
    existing.publicJwk = publicJwk;
    existing.lastConnectedAt = now;
  } else {
    friends.push({ friendId, publicJwk, pairedAt:now, lastConnectedAt:now });
    addMessage("system",`相手 ${friendId} をこの端末に保存しました。`);
  }
  localStorage.setItem(key, JSON.stringify(friends));
  updateFriendCount();
}

function getFriends(){
  return JSON.parse(localStorage.getItem("mesh-messenger:friends") || "[]");
}

function updateFriendCount(){
  const friends = getFriends();
  els.friendCount.textContent = String(friends.length);
  els.friendsList.innerHTML = "";
  if (!friends.length) {
    const empty = document.createElement("li");
    empty.className = "friend";
    empty.textContent = "まだ保存済みの相手はいません。";
    els.friendsList.append(empty);
    return;
  }
  const sorted = [...friends].sort((a, b) => (b.lastConnectedAt || 0) - (a.lastConnectedAt || 0));
  sorted.forEach((friend) => {
    const item = document.createElement("li");
    item.className = "friend";
    const info = document.createElement("div");
    info.className = "friendInfo";
    const id = document.createElement("strong");
    id.textContent = friend.friendId;
    const last = document.createElement("span");
    last.textContent = formatTime(friend.lastConnectedAt || friend.pairedAt);
    const reconnect = document.createElement("button");
    reconnect.type = "button";
    reconnect.className = "small secondary";
    reconnect.textContent = "再接続";
    reconnect.onclick = () => startReconnect(friend.friendId);
    info.append(id, last);
    item.append(info, reconnect);
    els.friendsList.append(item);
  });
}

function formatTime(value){
  if (!value) return "未接続";
  return new Intl.DateTimeFormat("ja-JP", {
    month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit"
  }).format(new Date(value));
}

async function deriveSharedKey(publicJwk){
  const peerKey = await crypto.subtle.importKey("jwk", publicJwk, { name:"ECDH", namedCurve:"P-256" }, false, []);
  sharedKey = await crypto.subtle.deriveKey({ name:"ECDH", public:peerKey }, identity.privateKey, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]);
}

async function encryptText(text){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = new TextEncoder().encode(text);
  const cipher = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, sharedKey, data);
  return { type:"encrypted-text", id:crypto.randomUUID(), from:identity.deviceId, createdAt:Date.now(), iv:b64encode(iv), ciphertext:b64encode(new Uint8Array(cipher)) };
}

async function decryptText(envelope){
  if (envelope.type !== "encrypted-text") throw new Error("未対応の封筒です。");
  const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64decode(envelope.iv) }, sharedKey, b64decode(envelope.ciphertext));
  return new TextDecoder().decode(plain);
}

function waitForIce(){
  return new Promise((resolve) => {
    if (pc.iceGatheringState === "complete") return resolve();
    const done = () => {
      if (pc.iceGatheringState === "complete") {
        pc.removeEventListener("icegatheringstatechange", done);
        clearTimeout(timer);
        resolve();
      }
    };
    const timer = setTimeout(resolve, 2800);
    pc.addEventListener("icegatheringstatechange", done);
  });
}

function show(id){
  views.forEach((view) => $(view).classList.toggle("hidden", view !== id));
}

function updateStatus(){
  const state = pc?.connectionState || "new";
  const open = channel?.readyState === "open" && sharedKey;
  els.status.textContent = open ? "暗号化接続中" : state;
  els.status.className = `status ${open ? "ok" : state === "failed" ? "bad" : ""}`;
  els.send.disabled = !open;
}

async function pack(obj){
  const data = new TextEncoder().encode(JSON.stringify(obj));
  const stream = new Blob([data]).stream().pipeThrough(new CompressionStream("gzip"));
  const buf = await new Response(stream).arrayBuffer();
  return b64encode(new Uint8Array(buf));
}

async function unpack(str){
  const bytes = b64decode(str.trim());
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
  return JSON.parse(await new Response(stream).text());
}

function b64encode(bytes){
  let text = "";
  for (let index = 0; index < bytes.length; index += 0x8000) {
    text += String.fromCharCode.apply(null, bytes.subarray(index, index + 0x8000));
  }
  return btoa(text);
}

function b64decode(str){
  const bin = atob(str);
  const bytes = new Uint8Array(bin.length);
  for (let index = 0; index < bin.length; index += 1) bytes[index] = bin.charCodeAt(index);
  return bytes;
}

function makeQr(id, text){
  const el = $(id);
  el.innerHTML = "";
  const size = Math.max(260, Math.min(360, Math.floor(window.innerWidth - 64)));
  const caption = document.createElement("p");
  caption.className = "notice";
  caption.textContent = text.startsWith("https://")
    ? "スマホカメラで読み取れます。"
    : "相手に読み取ってもらいます。";
  el.append(caption);
  const box = document.createElement("div");
  box.className = "qr";
  el.append(box);
  new QRCode(box, { text, width:size, height:size, correctLevel:QRCode.CorrectLevel.L });
}

async function startScanner(containerId, onResult){
  const container = $(containerId);
  container.innerHTML = '<p id="' + containerId + 'Status" class="notice">カメラ起動中です。QR全体が枠内に入るように少し離して読み取ってください。</p><div class="scanner"><video playsinline muted></video><div class="reticle"></div></div>';
  const video = container.querySelector("video");
  const scanStatus = $(containerId + "Status");
  let lastCode = "";
  let lastReadAt = 0;
  let frameCount = 0;
  try{
    if (!navigator.mediaDevices?.getUserMedia) {
      throw new Error("このブラウザではカメラAPIを使えません。");
    }
    scanStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment" } });
    if (scanStatus) scanStatus.textContent = "カメラが起動しました。QR全体を枠内に入れてください。";
    video.srcObject = scanStream;
    await video.play();
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently:true });
    const tick = async () => {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const image = ctx.getImageData(0, 0, canvas.width, canvas.height);
        frameCount += 1;
        if (frameCount % 45 === 0 && scanStatus) {
          scanStatus.textContent = "スキャン中です。QRが検出されない場合は、少し離す、画面を明るくする、端末を縦向きにする、を試してください。";
        }
        const code = jsQR(image.data, image.width, image.height, { inversionAttempts:"attemptBoth" });
        if (code?.data) {
          const now = Date.now();
          if (code.data !== lastCode || now - lastReadAt > 1600) {
            lastCode = code.data;
            lastReadAt = now;
            if (scanStatus) scanStatus.textContent = "QRを検出しました。処理しています。";
            const done = await onResult(code.data);
            if (done) return;
          }
        }
        if (!scanStream) {
          return;
        }
      }
      scanRAF = requestAnimationFrame(tick);
    };
    scanRAF = requestAnimationFrame(tick);
  }catch(error){
    container.innerHTML = `<p class="status bad">カメラを使えません: ${error.name}</p>`;
  }
}

function stopScanner(){
  if (scanRAF) cancelAnimationFrame(scanRAF);
  if (scanStream) scanStream.getTracks().forEach((track) => track.stop());
  scanRAF = null;
  scanStream = null;
}

function addMessage(kind, text){
  const node = document.createElement("div");
  node.className = `msg ${kind}`;
  node.textContent = text;
  els.messages.append(node);
  els.messages.scrollTop = els.messages.scrollHeight;
}
